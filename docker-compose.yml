services:

  # ── Application FastAPI ──────────────────────────────────────
  mychat:
    build: .
    container_name: mychat_app
    expose:
      - "8000"          # interne seulement — nginx est le seul à l'atteindre
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mychat_network

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mychat_nginx
    ports:
      - "80:80"         # accès via http://localhost
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      mychat:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mychat_network

networks:
  mychat_network:
    driver: bridge
