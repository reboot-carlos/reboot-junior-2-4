<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="my'chat - Un chatbot IA créé par une collégienne passionnée de codage. Trois personnalités, plusieurs langues, et une interface professionnelle.">
  <meta name="theme-color" content="#00D4FF">
  <title>my'chat - Ton IA Préférée</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Feuilles de styles CSS -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/chatbot.css">
  <link rel="stylesheet" href="/static/css/sidebar.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>

  <!-- ============================================================
       BARRE LATÉRALE
       ============================================================ -->
  <div class="sidebar" id="sidebar">
    <button class="btn-new-chat">➕ Nouveau Chat</button>

    <!-- Section Personnalités -->
    <div class="personalities-section">
      <h4>👥 Personnalités</h4>
      <div class="personality-list"></div>
    </div>

    <!-- Section Historique -->
    <div class="history-section">
      <h4>⏱️ Historique</h4>
      <div class="history-list"></div>
    </div>

    <!-- Section Paramètres -->
    <div class="parameters-section">
      <h4>⚙️ Paramètres</h4>
      <div class="parameter-list">
        <button class="param-option-btn" onclick="window.location.href='/'">🏠 Accueil</button>
        <button class="param-option-btn" onclick="SIDEBAR.toggleColorMenu()">🎨 Couleurs</button>
      </div>
      <div class="couleur-menu-sidebar" id="couleur-menu-sidebar" style="display: none;">
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#00D4FF')" style="background: #00D4FF;"></button>
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#FF6B6B')" style="background: #FF6B6B;"></button>
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#FFD700')" style="background: #FFD700;"></button>
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#00AA66')" style="background: #00AA66;"></button>
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#C084FC')" style="background: #C084FC;"></button>
        <button class="couleur-btn" onclick="SIDEBAR.setColor('#FF00FF')" style="background: #FF00FF;"></button>
      </div>
    </div>

    <button class="btn-toggle-sidebar">◀ Masquer</button>
  </div>

  <!-- Bouton Réouverture Barre Latérale -->
  <button class="btn-open-sidebar" id="btn-open-sidebar">▶</button>

  <!-- ============================================================
       CONTENEUR PRINCIPAL
       ============================================================ -->
  <div class="main-container">

    <!-- Boutons Flottants -->
    <button class="floating-btn jeux-btn">🎮 Jeux</button>
    <div class="jeux-menu" id="jeux-menu">
      <button class="jeu-option" onclick="alert('Jeux à venir!')">🦕 Dinosaure</button>
      <button class="jeu-option" onclick="alert('Jeux à venir!')">🐍 Serpent</button>
      <button class="jeu-option" onclick="alert('Jeux à venir!')">🧩 Tetris</button>
    </div>

    <button class="floating-btn emoji-btn">😊 Emoji</button>
    <div class="emoji-menu" id="emoji-menu">
      <button class="emoji-option" onclick="CHAT.removeEmoji()" style="border-color: #FF6B6B; color: #FF6B6B;">✕</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('😊')">😊</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('😜')">😜</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🎉')">🎉</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🚀')">🚀</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('⭐')">⭐</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🌟')">🌟</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('💻')">💻</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🤖')">🤖</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('💡')">💡</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🔥')">🔥</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('✨')">✨</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🎨')">🎨</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🎭')">🎭</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🎪')">🎪</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🎯')">🎯</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🏆')">🏆</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('👑')">👑</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('💎')">💎</button>
      <button class="emoji-option" onclick="CHAT.setEmoji('🌈')">🌈</button>
    </div>

    <button class="floating-btn langue-btn">⭐ Langues</button>
    <div class="langue-menu" id="langue-menu">
      <button class="langue-option" data-lang="fr">🇫🇷 Français</button>
      <button class="langue-option" data-lang="he">🇮🇱 עברית</button>
      <button class="langue-option" data-lang="en">🇬🇧 English</button>
      <button class="langue-option" data-lang="de">🇩🇪 Deutsch</button>
      <button class="langue-option" data-lang="es">🇪🇸 Español</button>
    </div>

    <!-- Header -->
    <header>
      <div>
        <h1>my'chat</h1>
        <p id="header-subtitle">Demande moi tout</p>
      </div>
    </header>

    <!-- Zone de Chat -->
    <div id="zone-chat"></div>

    <!-- Suggestions -->
    <div id="suggestions">
      <button class="btn-suggestion" onclick="CHAT.askQuestion('Coucou')">👋 Coucou</button>
      <button class="btn-suggestion" onclick="CHAT.askQuestion('Parle moi de la création')">🎨 Création</button>
      <button class="btn-suggestion" onclick="CHAT.askQuestion('Tu peux m\'aider avec mes devoirs?')">📚 Devoirs</button>
      <button id="btn-add-content-suggestion" class="btn-suggestion btn-add-suggestion">➕ Ajouter</button>
    </div>

    <!-- Menu Ajouter Contenu -->
    <div class="add-content-menu-suggestion" id="add-content-menu-suggestion">
      <button class="add-option-suggestion" onclick="CHAT.addImage()">🖼️ Image</button>
      <button class="add-option-suggestion" onclick="CHAT.addPhoto()">📷 Photo</button>
      <button class="add-option-suggestion" onclick="CHAT.addLink()">🔗 Lien</button>
    </div>

    <!-- Formulaire -->
    <div id="formulaire">
      <!-- Bouton + pour ajouter contenu -->
      <div style="position: relative; display: flex;">
        <button id="btn-add-content" class="btn-add-content" title="Ajouter image, photo ou lien" style="background: var(--primary); color: var(--dark); width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.8rem; font-weight: bold; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">+</button>
        <div class="add-content-menu" id="add-content-menu">
          <button class="add-option" onclick="CHAT.addImage()">🖼️ Image</button>
          <button class="add-option" onclick="CHAT.addPhoto()">📷 Appareil Photo</button>
          <button class="add-option" onclick="CHAT.addLink()">🔗 Lien</button>
        </div>
      </div>

      <input
        id="champ-texte"
        type="text"
        placeholder="Écris ton message ici..."
        autocomplete="off"
      />
      <button id="bouton-envoyer" title="Envoyer le message (Entrée)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
          <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16854487 C3.34915502,0.9114474 2.40734225,1.0185389 1.77946707,1.4898311 C0.994623095,2.1171464 0.837654326,3.20638905 1.15159189,3.99187593 L3.03521743,10.4328688 C3.03521743,10.5399603 3.19218622,10.6470518 3.50612381,10.6470518 L16.6915026,11.4325387 C16.6915026,11.4325387 17.1624089,11.4325387 17.1624089,11.9038309 C17.1624089,12.3751231 16.6915026,12.4744748 16.6915026,12.4744748 Z" />
        </svg>
      </button>
    </div>

    <!-- Input caché pour fichiers -->
    <input type="file" id="file-input" style="display: none;" accept="image/*">
    <input type="file" id="photo-input" style="display: none;" accept="image/*">

  </div>

  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/storage.js"></script>
  <script src="/static/js/characters.js"></script>
  <script src="/static/js/sidebar.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/app.js"></script>

</body>
</html>
